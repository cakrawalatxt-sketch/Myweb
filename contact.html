<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background: radial-gradient(circle at top, #0f2a3f, #0b1c2c);
    color:white;
}

/* NAVBAR */
.navbar{
    position:relative;
    margin:20px auto;
    padding:10px;
    background:rgba(255,255,255,0.05);
    border-radius:50px;
    width:fit-content;
}

.navbar ul{
    display:flex;
    list-style:none;
    padding:0;
    margin:0;
}

.navbar a{
    padding:10px 25px;
    color:white;
    text-decoration:none;
}

/* INDICATOR */
.indicator{
    position:absolute;
    height:40px;
    background:linear-gradient(45deg,#00f2ff,#00aaff);
    border-radius:50px;
    top:10px;
    left:10px;
    transition:0.3s;
}

/* CONTAINER */
.container{
    text-align:center;
    padding:50px;
}

/* PROFILE */
.profile{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid white;
    margin-bottom:15px;
}

/* SOCIAL */
.social{
    display:flex;
    gap:15px;
    justify-content:center;
    flex-wrap:wrap;
    margin-top:30px;
}

.btn{
    width:55px;
    height:55px;
    border-radius:50px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#222;
    cursor:pointer;
    transition:0.4s;
    overflow:hidden;
}

.btn svg{
    width:24px;
    height:24px;
    fill:white;
    flex-shrink:0;
}

.btn span{
    margin-left:10px;
    opacity:0;
    white-space:nowrap;
    transition:0.3s;
}

.btn.active{
    width:170px;
    justify-content:flex-start;
    padding-left:15px;
}

.btn.active span{
    opacity:1;
}

/* WARNA */
.whatsapp.active{ background:#25D366; }
.instagram.active{ background:linear-gradient(45deg,#f58529,#dd2a7b,#8134af,#515bd4); }
.tiktok.active{ background:#000; border:2px solid #ff0050; }
.telegram.active{ background:#0088cc; }
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
<div class="indicator"></div>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="about.html">About</a></li>
<li><a href="services.html">Services</a></li>
<li><a href="#" class="active">Contact</a></li>
</ul>
</nav>

<!-- CONTENT -->
<div class="container">

<!-- FOTO PROFIL -->
<img src="PP khusus AEG [FB62A26].png" class="profile">

<h1>Razx</h1>
<p>My sosial media</p>

<div class="social">

<!-- WHATSAPP -->
<div class="btn whatsapp" onclick="openLink(this,'https://wa.me/6285810537050')">
    <img src="Proyek Baru 66 [C6DFEC5].png" class="icon">
    <span>WhatsApp</span>
</div>

<!-- INSTAGRAM -->
<div class="btn instagram" onclick="openLink(this,'https://instagram.com/its_mecakra')">
<svg viewBox="0 0 24 24">
<path d="M7 2C4.2 2 2 4.2 2 7v10c0 2.8 2.2 5 5 5h10c2.8 0 5-2.2 5-5V7c0-2.8-2.2-5-5-5H7z"/>
</svg>
<span>Instagram</span>
</div>

<!-- TIKTOK -->
<div class="btn tiktok" onclick="openLink(this,'https://tiktok.com/@razzziy')">
<svg viewBox="0 0 24 24">
<path d="M16 2c.3 1.7 1.6 3 3.3 3.3v3c-1.3 0-2.6-.4-3.7-1.1v6.4"/>
</svg>
<span>TikTok</span>
</div>

<!-- TELEGRAM -->
<div class="btn telegram" onclick="openLink(this,'https://t.me/YeahIamRanzxxYty')">
<svg viewBox="0 0 24 24">
<path d="M9.9 16.2l-.4 3.8 2.6-2.5 5.4 3.9"/>
</svg>
<span>Telegram</span>
</div>

</div>
</div>

<script>
// NAVBAR
const indicator = document.querySelector(".indicator");
const active = document.querySelector(".active");

indicator.style.width = active.offsetWidth + "px";
indicator.style.left = active.offsetLeft + "px";

// BUTTON
function openLink(el,url){
    el.classList.toggle("active");
    setTimeout(()=>window.open(url,"_blank"),300);
}
</script>

</body>
</html>
