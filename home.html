<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOME</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:linear-gradient(135deg,#0b1c2c,#0f2e46);
    color:white;
    overflow-x:hidden;
}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:center;
    margin:20px;
    padding:10px;
    background:rgba(255,255,255,0.05);
    border-radius:50px;
    backdrop-filter:blur(10px);
    animation:fadeDown 0.8s ease;
}

.navbar a{
    padding:10px 25px;
    color:white;
    text-decoration:none;
    border-radius:50px;
    transition:0.3s;
}

.navbar a:hover{
    background:linear-gradient(45deg,#00f2ff,#00aaff);
    box-shadow:0 0 15px #00f2ff;
}

/* HERO */
.hero{
    text-align:center;
    padding:80px 20px;
    animation:fadeUp 1s ease;
}

.hero h1{
    font-size:40px;
}

.hero span{
    color:#00f2ff;
    text-shadow:0 0 15px #00f2ff;
}

.hero p{
    color:#ccc;
}

/* BUTTON */
.btn a{
    display:inline-block;
    margin:10px;
    padding:12px 25px;
    border-radius:25px;
    background:linear-gradient(45deg,#00f2ff,#00aaff);
    color:white;
    text-decoration:none;
    transition:0.3s;
}

.btn a:hover{
    transform:translateY(-5px) scale(1.05);
    box-shadow:0 10px 20px rgba(0,255,255,0.3);
}

/* CARD */
.card{
    margin:20px;
    padding:25px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    text-align:center;
    backdrop-filter:blur(10px);
    opacity:0;
    transform:translateY(40px);
    animation:cardShow 1s forwards;
}

.card:nth-child(1){animation-delay:0.3s;}
.card:nth-child(2){animation-delay:0.6s;}
.card:nth-child(3){animation-delay:0.9s;}

.card:hover{
    transform:translateY(-10px) scale(1.02);
    box-shadow:0 10px 30px rgba(0,255,255,0.2);
}

.card h2{
    color:#00f2ff;
}

/* ANIMATION */
@keyframes fadeUp{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

@keyframes fadeDown{
    from{opacity:0; transform:translateY(-30px);}
    to{opacity:1; transform:translateY(0);}
}

@keyframes cardShow{
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<nav class="navbar">
<a href="home.html">Home</a>
<a href="menu.html">Menu</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>

<div class="hero">
<h1>Next Project <span>RPG</span></h1>
<p>Platform modern untuk bot, automation, dan gaming.</p>

<div class="btn">
<a href="#">Sewa Bot</a>
<a href="#">Lihat Paket</a>
</div>
</div>

<div class="card">
<h2>Paket Bot</h2>
<p>Berbagai pilihan paket sesuai kebutuhan Anda.</p>
</div>

<div class="card">
<h2>Fitur Unggulan</h2>
<p>Anti delay, uptime tinggi, performa stabil.</p>
</div>

<div class="card">
<h2>Support</h2>
<p>Layanan bantuan cepat dan responsif.</p>
</div>

</body>
</html>
