<style>
body{
    margin:0;
    font-family:sans-serif;
    background:linear-gradient(135deg,#0b1c2c,#0f2e46);

}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:center;
    margin:20px;
    padding:10px;
    background:rgba(255,255,255,0.05);
    border-radius:50px;
    backdrop-filter:blur(10px);
}

.navbar ul{
    display:flex;
    list-style:none;
    margin:0;
    padding:0;
}

.navbar li{
    margin:0 5px;
}

.navbar a{
    display:block;
    padding:10px 25px;
    color:white;
    text-decoration:none;
    border-radius:50px;
    transition:0.3s;
}

/* efek hover */
.navbar a:hover{
    background:linear-gradient(45deg,#00f2ff,#00aaff);
}

/* HERO */
.hero{
    text-align:center;
    padding:80px 20px;
}

.hero h1{
    font-size:40px;
    margin-bottom:10px;
}

.hero span{
    color:#00f2ff;
    text-shadow:0 0 10px #00f2ff;
}

.hero p{
    color:#ccc;
}

/* BUTTON */
.btn{
    margin-top:20px;
}

.btn a{
    display:inline-block;
    margin:10px;
    padding:12px 25px;
    border-radius:25px;
    background:linear-gradient(45deg,#00f2ff,#00aaff);
    color:white;
    text-decoration:none;
    transition:0.3s;
}

.btn a:hover{
    transform:scale(1.05);
}

/* CARD */
.card{
    margin:20px;
    padding:20px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    text-align:center;
    backdrop-filter:blur(10px);
}

.card h2{
    color:#00f2ff;
}
</style>
</head>
